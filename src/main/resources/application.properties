spring.application.name=digital-detox-tracker

# Microsoft SQL Server Configuration
# Please ensure you have created the database 'DetoxDB' in SSMS or adjust the name below.
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=DetoxDB;encrypt=true;trustServerCertificate=true
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=YourPassword123

# JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Security
# Hibernate will automatically create tables if database exists
